<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beauty Articles Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#faf7f4;--fg:#2c2420;--muted:#8a7e76;--accent:#c4956a;
  --card:#fff;--border:#e8e0d8;--rose:#d4a0a0;--sage:#a8b5a0;
  --shadow:0 2px 16px rgba(44,36,32,.06);--radius:12px;
  --font-display:'Playfair Display',Georgia,serif;
  --font-body:'Source Sans 3','Segoe UI',sans-serif;
}
html{scroll-behavior:smooth}
body{font-family:var(--font-body);background:var(--bg);color:var(--fg);line-height:1.7;min-height:100vh}

/* Loading */
#loader{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;transition:opacity .4s}
#loader.hidden{opacity:0;pointer-events:none;display:none !important}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loader p{margin-top:16px;color:var(--muted);font-size:14px}

/* Header */
.site-header{background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;backdrop-filter:blur(12px);background:rgba(255,255,255,.85)}
.header-inner{max-width:1200px;margin:0 auto;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.site-title{font-family:var(--font-display);font-size:24px;font-weight:700;color:var(--fg);letter-spacing:-.02em}
.site-title span{color:var(--accent)}
.header-stats{font-size:13px;color:var(--muted);display:flex;gap:16px}
.header-stats b{color:var(--fg);font-weight:600}

/* Search & Filter */
.toolbar{max-width:1200px;margin:24px auto 0;padding:0 24px;display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.search-box{flex:1;min-width:240px;position:relative}
.search-box input{width:100%;padding:10px 16px 10px 40px;border:1px solid var(--border);border-radius:var(--radius);font-size:14px;font-family:var(--font-body);background:var(--card);color:var(--fg);transition:border-color .2s}
.search-box input:focus{outline:none;border-color:var(--accent)}
.search-box svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted)}
.filter-btn{padding:8px 16px;border:1px solid var(--border);border-radius:20px;background:var(--card);color:var(--muted);font-size:13px;cursor:pointer;transition:all .2s;font-family:var(--font-body);white-space:nowrap}
.filter-btn:hover,.filter-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* Grid */
.articles-grid{max-width:1200px;margin:24px auto;padding:0 24px;display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:24px}

/* Card */
.article-card{background:var(--card);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);transition:transform .25s,box-shadow .25s;cursor:pointer;opacity:0;animation:fadeUp .5s forwards}
.article-card:hover{transform:translateY(-4px);box-shadow:0 8px 32px rgba(44,36,32,.1)}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.card-cover{width:100%;aspect-ratio:2/1;object-fit:cover;display:block;background:var(--border)}
.card-body{padding:20px}
.card-category{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--accent);font-weight:600;margin-bottom:8px}
.card-title{font-family:var(--font-display);font-size:18px;font-weight:600;line-height:1.35;margin-bottom:10px;color:var(--fg);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-desc{font-size:13.5px;color:var(--muted);line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:14px}
.card-meta{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--muted)}
.card-author{font-weight:500;color:var(--fg)}

/* Article Detail Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(44,36,32,.5);z-index:200;display:none;opacity:0;transition:opacity .3s}
.modal-overlay.open{display:flex;opacity:1}
.modal-content{background:var(--bg);width:100%;max-width:780px;margin:auto;overflow-y:auto;max-height:100vh;padding:0;animation:modalIn .3s}
@keyframes modalIn{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-close{position:sticky;top:0;z-index:10;display:flex;justify-content:flex-end;padding:12px 20px;background:linear-gradient(to bottom,var(--bg) 60%,transparent)}
.modal-close button{width:36px;height:36px;border-radius:50%;border:none;background:var(--card);color:var(--fg);font-size:18px;cursor:pointer;box-shadow:var(--shadow);display:flex;align-items:center;justify-content:center;transition:background .2s}
.modal-close button:hover{background:var(--accent);color:#fff}
.modal-body{padding:0 32px 48px}
.modal-cover{width:100%;aspect-ratio:2/1;object-fit:cover;border-radius:var(--radius);margin-bottom:24px;display:block}
.modal-category{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--accent);font-weight:600;margin-bottom:8px}
.modal-title{font-family:var(--font-display);font-size:32px;font-weight:700;line-height:1.25;margin-bottom:12px;color:var(--fg)}
.modal-meta{font-size:13px;color:var(--muted);margin-bottom:24px;display:flex;gap:16px;flex-wrap:wrap}
.modal-meta b{color:var(--fg)}
.modal-keywords{margin-bottom:24px}
.modal-keywords span{display:inline-block;padding:4px 10px;background:var(--card);border:1px solid var(--border);border-radius:14px;font-size:11px;color:var(--muted);margin:3px 4px 3px 0}
.modal-desc{font-size:15px;color:var(--muted);line-height:1.7;margin-bottom:28px;padding:16px 20px;background:var(--card);border-radius:var(--radius);border-left:3px solid var(--accent)}

/* Article Content Styles */
.article-content{font-size:16px;line-height:1.8;color:var(--fg)}
.article-content p{margin-bottom:18px}
.article-content h2{font-family:var(--font-display);font-size:24px;font-weight:700;margin:36px 0 16px;color:var(--fg);padding-bottom:8px;border-bottom:2px solid var(--border)}
.article-content h3{font-family:var(--font-display);font-size:20px;font-weight:600;margin:28px 0 12px;color:var(--fg)}
.article-content img{width:100%;max-width:100%;border-radius:var(--radius);margin:24px 0;display:block;box-shadow:var(--shadow)}

/* Footer */
.site-footer{max-width:1200px;margin:48px auto 0;padding:24px;text-align:center;font-size:12px;color:var(--muted);border-top:1px solid var(--border)}

/* No Results */
.no-results{text-align:center;padding:80px 24px;color:var(--muted)}
.no-results h3{font-family:var(--font-display);font-size:20px;color:var(--fg);margin-bottom:8px}

/* Responsive */
@media(max-width:640px){
  .articles-grid{grid-template-columns:1fr}
  .header-inner{flex-direction:column;align-items:flex-start}
  .modal-body{padding:0 16px 32px}
  .modal-title{font-size:24px}
  .site-title{font-size:20px}
}
</style>
</head>
<body>

<div id="loader"><div class="spinner"></div><p>Loading articles...</p></div>

<header class="site-header">
  <div class="header-inner">
    <div class="site-title">Glow <span>Editorial</span></div>
    <div class="header-stats">
      <span><b id="totalCount">0</b> Articles</span>
      <span><b id="imgCount">0</b> Images</span>
    </div>
  </div>
</header>

<div class="toolbar">
  <div class="search-box">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="searchInput" placeholder="Search articles...">
  </div>
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn" data-filter="Makeup">Makeup</button>
  <button class="filter-btn" data-filter="Skincare">Skincare</button>
  <button class="filter-btn" data-filter="Hair">Hair</button>
  <button class="filter-btn" data-filter="Nails">Nails</button>
  <button class="filter-btn" data-filter="Fragrance">Fragrance</button>
  <button class="filter-btn" data-filter="Procedures">Procedures</button>
</div>

<div class="articles-grid" id="articlesGrid"></div>

<div class="no-results" id="noResults" style="display:none">
  <h3>No articles found</h3>
  <p>Try a different search term or filter.</p>
</div>

<footer class="site-footer">Beauty Articles Preview &mdash; Generated with data.json</footer>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal-content">
    <div class="modal-close"><button onclick="closeModal()">&times;</button></div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
const DATA_URL = 'beauty_articles_reviewed.json?v=16';
const IMG_BASE = 'https://cdn.jsdelivr.net/gh/shishizhihao0-afk/meizhuang@main';
let allArticles = [];
let currentFilter = 'all';
let currentSearch = '';

function fixImgUrl(url) {
  if (!url) return '';
  if (url.startsWith('/imagesArticleUploads/')) {
    return IMG_BASE + url;
  }
  if (url.includes('raw.githubusercontent.com/shishizhihao0-afk/meizhuang/main')) {
    return url.replace('https://raw.githubusercontent.com/shishizhihao0-afk/meizhuang/main', IMG_BASE);
  }
  return url;
}

async function loadData() {
  try {
    const res = await fetch(DATA_URL);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    allArticles = await res.json();
    document.getElementById('totalCount').textContent = allArticles.length;
    document.getElementById('imgCount').textContent = allArticles.length * 3;
    renderArticles();
    document.getElementById('loader').classList.add('hidden');
  } catch (err) {
    console.error('Failed to load data:', err);
    document.getElementById('loader').innerHTML = `<p style="color:#c0392b">Failed to load data.json<br><small>${err.message}</small></p>`;
  }
}

function getFilterCategory(article) {
  const cat = (article.classify_backup || '').toLowerCase();
  // 先检查Cosmetic Procedures，避免与Makeup混淆
  if (cat.includes('procedure') || cat.includes('surgical') || cat.includes('botox') || cat.includes('filler') || cat.includes('lift') || cat.includes('augment') || cat.includes('implant') || cat.includes('liposuction') || cat.includes('tummy tuck') || cat.includes('rhinoplasty') || cat.includes('blepharoplasty')) return 'Procedures';
  if (cat.includes('makeup')) return 'Makeup';
  if (cat.includes('skin') || cat.includes('acne') || cat.includes('moistur')) return 'Skincare';
  if (cat.includes('hair')) return 'Hair';
  if (cat.includes('nail') || cat.includes('manicure') || cat.includes('pedicure')) return 'Nails';
  if (cat.includes('fragrance') || cat.includes('perfume') || cat.includes('scent')) return 'Fragrance';
  return 'Other';
}

function renderArticles() {
  const grid = document.getElementById('articlesGrid');
  const noResults = document.getElementById('noResults');
  const search = currentSearch.toLowerCase();
  
  let filtered = allArticles.filter(a => {
    const matchFilter = currentFilter === 'all' || getFilterCategory(a) === currentFilter;
    const matchSearch = !search || 
      a.title.toLowerCase().includes(search) || 
      (a.description || '').toLowerCase().includes(search) ||
      (a.keywords || '').toLowerCase().includes(search);
    return matchFilter && matchSearch;
  });

  if (filtered.length === 0) {
    grid.innerHTML = '';
    noResults.style.display = 'block';
    return;
  }

  noResults.style.display = 'none';
  grid.innerHTML = filtered.map((a, i) => {
    const coverUrl = fixImgUrl(a.cover && a.cover[0] ? a.cover[0].url : '');
    const category = getFilterCategory(a);
    return `
      <div class="article-card" style="animation-delay:${Math.min(i * 0.04, 1)}s" onclick="openArticle(${allArticles.indexOf(a)})">
        <img class="card-cover" src="${coverUrl}" alt="${escHtml(a.title)}" loading="lazy" onerror="this.style.background='#e8e0d8'">
        <div class="card-body">
          <div class="card-category">${category}</div>
          <h3 class="card-title">${escHtml(a.title)}</h3>
          <p class="card-desc">${escHtml(a.description || '')}</p>
          <div class="card-meta">
            <span class="card-author">${escHtml(a.author || '')}</span>
          </div>
        </div>
      </div>`;
  }).join('');
}

function openArticle(idx) {
  const a = allArticles[idx];
  if (!a) return;
  const body = document.getElementById('modalBody');
  const coverUrl = fixImgUrl(a.cover && a.cover[0] ? a.cover[0].url : '');
  const category = getFilterCategory(a);
  const keywords = (a.keywords || '').split(',').map(k => k.trim()).filter(Boolean);
  
  // Fix content image URLs too
  let content = a.content || '';
  const imgBase = typeof IMG_BASE !== 'undefined' ? IMG_BASE : 'https://cdn.jsdelivr.net/gh/shishizhihao0-afk/meizhuang@main';
  content = content.replace(/src="\/imagesArticleUploads\//g, 'src="' + imgBase + '/imagesArticleUploads/');
  
  body.innerHTML = `
    <img class="modal-cover" src="${coverUrl}" alt="${escHtml(a.title)}" onerror="this.style.background='#e8e0d8'">
    <div class="modal-category">${category}</div>
    <h1 class="modal-title">${escHtml(a.title)}</h1>
    <div class="modal-meta">
      <span>By <b>${escHtml(a.author || '')}</b></span>
      <span>Category: <b>${escHtml(a.classify_backup || '')}</b></span>
    </div>
    ${keywords.length ? `<div class="modal-keywords">${keywords.map(k => `<span>${escHtml(k)}</span>`).join('')}</div>` : ''}
    <div class="modal-desc">${escHtml(a.description || '')}</div>
    <div class="article-content">${content}</div>
  `;
  
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}

function escHtml(str) {
  const d = document.createElement('div');
  d.textContent = str || '';
  return d.innerHTML;
}

// Event Listeners
document.getElementById('searchInput').addEventListener('input', e => {
  currentSearch = e.target.value;
  renderArticles();
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderArticles();
  });
});

document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// Init
loadData();
</script>
</body>
</html>
